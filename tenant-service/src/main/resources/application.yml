server:
  port: 8083

spring:
  application:
    name: tenant-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bricoloc}
    username: ${DB_USERNAME:bricoloc}
    password: ${DB_PASSWORD:bricoloc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true